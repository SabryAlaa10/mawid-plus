<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center px-6 py-4 w-full rtl:flex-row-reverse">
<div class="flex items-center gap-4">
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-90">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg text-slate-800 dark:text-white">حجز موعد</h1>
</div>
<div class="font-manrope font-black text-blue-700 dark:text-blue-400 text-xl tracking-tight">Mawid+</div>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-90">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">notifications</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-4 mt-6 space-y-8">
<!-- Doctor Summary Card - Asymmetric Editorial Style -->
<section class="relative">
<div class="bg-surface-container-lowest rounded-tr-xl rounded-bl-xl rounded-tl-[3rem] rounded-br-[3rem] p-6 shadow-sm flex gap-6 items-center overflow-hidden">
<div class="relative w-24 h-24 flex-shrink-0">

<div class="absolute -bottom-1 -right-1 bg-secondary w-6 h-6 rounded-full border-4 border-surface-container-lowest"></div>
</div>
<div class="flex-grow">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1 block">استشاري أمراض القلب</span>
<h2 class="font-manrope text-2xl font-bold text-primary mb-1">د. فيصل القحطاني</h2>
<div class="flex items-center gap-2 text-sm text-on-surface-variant">
<span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-bold">4.9</span>
<span class="text-xs opacity-60">(120+ تقييم)</span>
</div>
</div>
</div>
</section>
<!-- Calendar Section - Tonal Layering -->
<section class="space-y-4">
<div class="flex justify-between items-end px-2">
<h3 class="font-manrope text-xl font-extrabold text-on-surface">اختر التاريخ</h3>
<span class="text-sm font-semibold text-primary">أكتوبر 2023</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl">
<div class="grid grid-cols-7 gap-2">
<!-- Weekdays -->
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">سبت</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">أحد</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">اثنين</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">ثلاثاء</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">أربعاء</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">خميس</div>
<div class="text-center text-[10px] font-bold text-outline uppercase pb-2">جمعة</div>
<!-- Days - Mock Selection -->

<button class="h-12 flex items-center justify-center rounded-lg text-sm font-semibold text-on-surface-variant hover:bg-white transition-colors">١٧</button>
<button class="h-12 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold shadow-lg shadow-primary/20 scale-105">١٨</button>
<button class="h-12 flex items-center justify-center rounded-lg text-sm font-semibold text-on-surface-variant hover:bg-white transition-colors">١٩</button>
<button class="h-12 flex items-center justify-center rounded-lg text-sm font-semibold text-on-surface-variant hover:bg-white transition-colors">٢٠</button>
</div>
</div>
</section>
<!-- Time Slots - Bento Style -->

<h3 class="font-manrope text-xl font-extrabold text-on-surface px-2">الوقت المتاح</h3>
<div class="grid grid-cols-3 gap-3">
<button class="bg-surface-container-lowest p-4 rounded-xl text-center transition-all hover:bg-primary-fixed hover:text-on-primary-fixed group border border-transparent hover:border-primary/20">
<span class="block text-lg font-bold font-manrope">09:00</span>
<span class="text-[10px] font-bold opacity-60 uppercase">صباحاً</span>
</button>
<button class="bg-surface-container-lowest p-4 rounded-xl text-center transition-all hover:bg-primary-fixed hover:text-on-primary-fixed group border border-transparent hover:border-primary/20">
<span class="block text-lg font-bold font-manrope">09:30</span>
<span class="text-[10px] font-bold opacity-60 uppercase">صباحاً</span>
</button>
<button class="bg-primary p-4 rounded-xl text-center text-on-primary shadow-xl shadow-primary/15 transform scale-105">
<span class="block text-lg font-bold font-manrope">10:00</span>
<span class="text-[10px] font-bold opacity-80 uppercase">صباحاً</span>
</button>
<button class="bg-surface-container-lowest p-4 rounded-xl text-center transition-all hover:bg-primary-fixed hover:text-on-primary-fixed group border border-transparent hover:border-primary/20">
<span class="block text-lg font-bold font-manrope">10:30</span>
<span class="text-[10px] font-bold opacity-60 uppercase">صباحاً</span>
</button>
<button class="bg-surface-container-low/50 p-4 rounded-xl text-center cursor-not-allowed opacity-40">
<span class="block text-lg font-bold font-manrope">11:00</span>
<span class="text-[10px] font-bold uppercase">صباحاً</span>
</button>
<button class="bg-surface-container-lowest p-4 rounded-xl text-center transition-all hover:bg-primary-fixed hover:text-on-primary-fixed group border border-transparent hover:border-primary/20">
<span class="block text-lg font-bold font-manrope">11:30</span>
<span class="text-[10px] font-bold opacity-60 uppercase">صباحاً</span>
</button>
</div>
</section>

</div>

<div class="max-w-2xl mx-auto flex items-center justify-between gap-6">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-outline uppercase">إجمالي الرسوم</span>
<span class="text-2xl font-black font-manrope text-on-surface">٣٥٠ ر.س</span>
</div>
<button class="bg-primary text-on-primary px-10 py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/30 transition-transform active:scale-95 flex items-center gap-3">
                تأكيد الموعد
                <span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
</div>
</div>
<!-- Navigation Mirroring logic from JSON -->
<nav class="hidden md:flex fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl rounded-full px-8 py-3 shadow-2xl items-center gap-10 border border-white/20">
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-blue-600 transition-all cursor-pointer">
<span class="material-symbols-outlined">home</span>
<span class="font-public-sans text-xs font-semibold mt-1">Home</span>
