<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mawid+ | Doctor Portal Login</title>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#bcc7de",
                        "tertiary-fixed-dim": "#ffb691",
                        "primary-fixed-dim": "#adc7ff",
                        "on-background": "#171c1f",
                        "surface-tint": "#005bc0",
                        "surface-container": "#eaeef2",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f0f4f8",
                        "on-surface": "#171c1f",
                        "background": "#f6fafe",
                        "on-secondary-fixed": "#111c2d",
                        "primary-fixed": "#d8e2ff",
                        "inverse-primary": "#adc7ff",
                        "outline": "#727785",
                        "on-secondary": "#ffffff",
                        "tertiary": "#9e4300",
                        "on-tertiary-fixed-variant": "#783100",
                        "on-tertiary-container": "#0e0200",
                        "on-primary-fixed-variant": "#004493",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#edf1f5",
                        "primary-container": "#1a73e8",
                        "on-secondary-container": "#586377",
                        "secondary": "#545f73",
                        "secondary-container": "#d5e0f8",
                        "on-primary-fixed": "#001a41",
                        "secondary-fixed": "#d8e3fb",
                        "surface-dim": "#d6dade",
                        "surface-bright": "#f6fafe",
                        "surface-container-high": "#e4e9ed",
                        "on-error": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "on-surface-variant": "#414754",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2c3134",
                        "primary": "#005bbf",
                        "outline-variant": "#c1c6d6",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#3c475a",
                        "surface-container-highest": "#dfe3e7",
                        "error": "#ba1a1a",
                        "tertiary-container": "#c55500",
                        "on-tertiary-fixed": "#341100",
                        "surface": "#f6fafe",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffdbcb",
                        "surface-variant": "#dfe3e7"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #005bbf 0%, #1a73e8 100%);
        }
        .input-focus-glow:focus {
            box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px rgba(26, 115, 232, 0.15);
        }
        .editorial-shadow {
            box-shadow: 0 10px 30px -5px rgba(23, 28, 31, 0.05);
        }
    </style>
</head>
<body class="bg-[#f1f5f9] font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Header / Logo Branding -->
<div class="mb-10 text-center">
<h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight">Mawid+</h1>
<p class="font-label text-on-secondary-container mt-2 tracking-wide font-medium">Log in to your clinic portal</p>
</div>
<!-- Professional Login Card -->
<section class="bg-surface-container-lowest rounded-2xl editorial-shadow overflow-hidden p-8 md:p-10">
<!-- Avatar Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center mb-4 ring-4 ring-background">
<span class="material-symbols-outlined text-4xl text-outline-variant" data-icon="account_circle">account_circle</span>
</div>
<h2 class="font-headline font-bold text-xl text-on-surface">Welcome Back, Doctor</h2>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container input-focus-glow transition-all" id="email" name="email" placeholder="doctor@mawidhospital.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container input-focus-glow transition-all" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-high cursor-pointer" id="remember" type="checkbox"/>
<label class="font-label text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Stay logged in for this session</label>
</div>
<!-- CTA Button -->
<button class="w-full btn-gradient text-white font-headline font-bold py-4 rounded-xl editorial-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Access Dashboard</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-10 pt-8 border-t border-surface-container flex flex-col items-center space-y-4">
<p class="text-sm text-on-secondary-container font-label">Don't have an account yet?</p>
<button class="px-6 py-2 bg-surface-container-high text-on-secondary-container font-bold rounded-lg text-sm hover:bg-surface-container transition-colors">
                    Request Clinic Access
                </button>
</div>
</section>
<!-- Footer -->
<footer class="mt-8 flex flex-col md:flex-row items-center justify-between text-[11px] font-label text-outline uppercase tracking-widest px-4 space-y-4 md:space-y-0">
<p>© 2024 Mawid+ Medical Systems</p>
<div class="flex space-x-6">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Security Standards</a>
</div>
</footer>
</main>
<!-- Support Floating UI Element -->
<div class="fixed bottom-6 right-6">
<button class="bg-surface-container-lowest editorial-shadow w-12 h-12 rounded-full flex items-center justify-center text-primary-container hover:text-primary transition-all border border-surface-container-low">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</body></html>
