name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    runs-on: ubuntu-latest
    # مطلوب لـ vitest و build: supabaseClient يُحمَّل عند استيراد الخدمات
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-not-a-real-secret
    defaults:
      run:
        working-directory: Mawid-Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Mawid-Web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  android-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mawid-Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: local.properties for CI
        run: |
          printf '%s\n' \
            "SUPABASE_URL=https://example.supabase.co" \
            "SUPABASE_ANON_KEY=ci-placeholder" \
            "MAPS_API_KEY=" \
            > local.properties
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest --no-daemon
